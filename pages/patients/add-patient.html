<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Patient | MediCare Pro</title>

<link rel="stylesheet" href="../../assets/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <div class="sidebar-logo">

                <img src="../../assets/icons/logo.svg">

            </div>

            <div class="sidebar-title">

                <h3>MediCare Pro</h3>

                <span>Hospital ERP</span>

            </div>

        </div>

        <ul class="sidebar-menu">

            <li onclick="window.location.href='../../hospital.html'">

                <i data-lucide="layout-dashboard"></i>

                <span>Dashboard</span>

            </li>

            <li class="active">

                <i data-lucide="users"></i>

                <span>Patients</span>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <!-- Topbar -->

        <nav class="topbar">

            <div>

                <h2>Add New Patient</h2>

                <small>Create a new patient record</small>

            </div>

            <button class="add-btn"
            onclick="window.location.href='patients.html'">

                ← Back

            </button>

        </nav>

        <!-- Progress -->

        <div class="wizard-progress">

            <div class="step active">

                <div class="circle">1</div>

                <span>Personal</span>

            </div>

            <div class="step">

                <div class="circle">2</div>

                <span>Medical</span>

            </div>

            <div class="step">

                <div class="circle">3</div>

                <span>Emergency</span>

            </div>

            <div class="step">

                <div class="circle">4</div>

                <span>Review</span>

            </div>

        </div>

        <!-- Card -->

       <div class="patient-form-card">

    <div class="form-step active" id="step1">

    <h2>Personal Information</h2>

    <p>Complete the patient's personal information.</p>

    <form class="patient-form">

        <!-- PHOTO -->

        <div class="photo-section">

            <div class="photo-box">

               <img src="https://placehold.co/140x140/png">
                     id="photoPreview"
                     alt="Patient Photo">

                <input
                type="file"
                id="patientPhoto"
                accept="image/*">

                <button
                type="button"
                class="upload-btn"
                onclick="document.getElementById('patientPhoto').click();">

                    Upload Photo

                </button>

            </div>

        </div>

        <!-- PATIENT ID -->

        <div class="form-group">

            <label>Patient ID</label>

            <input
            type="text"
            id="patientId"
            readonly>

        </div>

        <!-- FIRST NAME -->

        <div class="form-group">

            <label>First Name</label>

            <input
            type="text"
            placeholder="Enter first name">

        </div>

        <!-- LAST NAME -->

        <div class="form-group">

            <label>Last Name</label>

            <input
            type="text"
            placeholder="Enter last name">

        </div>

        <!-- GENDER -->

        <div class="form-group">

            <label>Gender</label>

            <select>

                <option>Select Gender</option>

                <option>Male</option>

                <option>Female</option>

            </select>

        </div>

        <!-- DOB -->

        <div class="form-group">

            <label>Date of Birth</label>

            <input
            type="date"
            id="dob">

        </div>

        <!-- AGE -->

        <div class="form-group">

            <label>Age</label>

            <input
            type="text"
            id="age"
            readonly>

        </div>

        <!-- PHONE -->

        <div class="form-group">

            <label>Phone Number</label>

            <input
            type="text"
            placeholder="080xxxxxxxx">

        </div>

        <!-- EMAIL -->

        <div class="form-group">

            <label>Email</label>

            <input
            type="email"
            placeholder="patient@email.com">

        </div>

        <!-- ADDRESS -->

        <div class="form-group full">

            <label>Home Address</label>

            <textarea
            placeholder="Enter full home address"></textarea>

        </div>

        <!-- BUTTONS -->

        <div class="form-navigation">

            <button
            type="button"
            class="cancel-form-btn"
            onclick="window.location.href='patients.html'">

                Cancel

            <button
type="button"
class="next-btn"
id="nextBtn">

    Next →

</button>

        </div>

</form>

</div>

<div class="form-step" id="step2">

</div>

<div class="form-step" id="step3">

</div>

<div class="form-step" id="step4">

</div>

</div> 

    </main>

</div>

<script>

lucide.createIcons();

/* AUTO PATIENT ID */

document.getElementById("patientId").value =
"PAT-" + Math.floor(1000 + Math.random()*9000);

/* PHOTO PREVIEW */

const patientPhoto =
document.getElementById("patientPhoto");

patientPhoto.addEventListener("change",function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload=function(event){

            document.getElementById("photoPreview").src =
            event.target.result;

        }

        reader.readAsDataURL(file);

    }

});

/* AUTO AGE */

const dob =
document.getElementById("dob");

dob.addEventListener("change",function(){

    const birth =
    new Date(this.value);

    const today =
    new Date();

    let age =
    today.getFullYear() - birth.getFullYear();

    const month =
    today.getMonth() - birth.getMonth();

    if(month < 0 || (month === 0 && today.getDate() < birth.getDate())){

        age--;

    }

    document.getElementById("age").value = age;

});
    
/* ===========================
   NEXT BUTTON
=========================== */

const nextBtn = document.getElementById("nextBtn");

nextBtn.onclick = function () {

    alert("Button clicked");

    document.getElementById("step1").classList.remove("active");

    document.getElementById("step2").classList.add("active");

};

});
});
});
    
</script>

</body>

</html>
