<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patients Management | MediCare Pro</title>

<link rel="stylesheet" href="../../assets/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="dashboard-body">

<div class="patients-page">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>Patients Management</h1>

            <p>
                Manage all hospital patients from one place.
            </p>

        </div>

        <button class="add-btn">

            <i data-lucide="user-plus"></i>

            Add Patient

        </button>

    </div>

    <!-- STATS -->

    <div class="patients-stats">

        <div class="stat-card">

            <h3>Total Patients</h3>

            <h2>1,245</h2>

        </div>

        <div class="stat-card">

            <h3>Admitted</h3>

            <h2>321</h2>

        </div>

        <div class="stat-card">

            <h3>Discharged</h3>

            <h2>924</h2>

        </div>

        <div class="stat-card">

            <h3>Today's Registration</h3>

            <h2>18</h2>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="search-section">

        <div class="patient-search">

            <i data-lucide="search"></i>

            <input
            type="text"
            placeholder="Search patient by name, ID, phone number...">

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-card">

        <table class="patients-table">

            <thead>

                <tr>

                    <th>Patient ID</th>

                    <th>Name</th>

                    <th>Gender</th>

                    <th>Age</th>

                    <th>Department</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>PAT-1001</td>

                    <td>John Doe</td>

                    <td>Male</td>

                    <td>35</td>

                    <td>Cardiology</td>

                    <td>
                        <span class="status admitted">
                            Admitted
                        </span>
                    </td>

                    <td>

                        <button class="action-btn view">
                            View
                        </button>

                        <button class="action-btn edit">
                            Edit
                        </button>

                        <button class="action-btn delete">
                            Delete
                        </button>

                    </td>

                </tr>

                <tr>

                    <td>PAT-1002</td>

                    <td>Mary James</td>

                    <td>Female</td>

                    <td>28</td>

                    <td>Laboratory</td>

                    <td>
                        <span class="status discharged">
                            Discharged
                        </span>
                    </td>

                    <td>

                        <button class="action-btn view">
                            View
                        </button>

                        <button class="action-btn edit">
                            Edit
                        </button>

                        <button class="action-btn delete">
                            Delete
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>
lucide.createIcons();
</script>

</body>

</html>
