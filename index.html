<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MediCare Pro ERP</title>

<link rel="stylesheet" href="assets/css/style.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<script
src="https://unpkg.com/lucide@latest">
</script>

</head>

<body>

<div class="overlay"></div>

<div class="login-container">

    <div class="login-card">

        <div class="brand">

            <div class="logo">
                <img src="assets/icons/logo.svg" alt="Logo">
            </div>

            <h1>MediCare Pro</h1>

            <p>Smart Healthcare Management Platform</p>

        </div>

        <form id="loginForm">

            <div class="input-group">

                <label>Hospital Domain</label>

                <div class="input-box">

                    <i data-lucide="globe"></i>

                    <input
                    type="text"
                    id="hospitalDomain"
                    placeholder="e.g. royalcare">

                </div>

            </div>

            <div class="input-group">

                <label>Email</label>

                <div class="input-box">

                    <i data-lucide="user"></i>

                    <input
                    type="email"
                    id="email"
                    placeholder="e.g. admin@royalcare.com">

                </div>

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i data-lucide="lock"></i>

                    <input
                    type="password"
                    id="password"
                    placeholder="Enter your password">

                </div>

            </div>

            <div class="remember">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button
            type="submit"
            class="login-btn">

                Login

            </button>

        </form>

        <div class="trust">

            <i data-lucide="shield-check"></i>

            <span>

                Secure • Reliable • Trusted by Healthcare Professionals

            </span>

        </div>

    </div>

</div>

<div class="footer">

© 2026 MediCare Pro. All rights reserved.

</div>

<script type="module" src="assets/js/login.js"></script>

</body>
</html>
